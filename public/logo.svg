<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" fill="none">
  <defs>
    <!-- Primary gradient: purple to cyan -->
    <linearGradient id="grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7d25cd"/>
      <stop offset="50%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#3caefc"/>
    </linearGradient>
    <!-- Glow gradient for the S mark -->
    <linearGradient id="grad-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b4dff"/>
      <stop offset="100%" stop-color="#2a9df4"/>
    </linearGradient>
    <!-- Subtle shine highlight -->
    <linearGradient id="grad-shine" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Clip for the S icon background -->
    <clipPath id="icon-clip">
      <rect x="4" y="4" width="72" height="72" rx="18"/>
    </clipPath>
  </defs>

  <!-- S Icon Mark -->
  <g>
    <!-- Outer rounded square with gradient border -->
    <rect x="2" y="12" width="76" height="76" rx="20" fill="url(#grad-main)"/>
    <!-- Inner dark background -->
    <rect x="5" y="15" width="70" height="70" rx="17" fill="#0b0e19"/>

    <!-- Futuristic S letterform built from geometric paths -->
    <g transform="translate(40, 50)">
      <!-- Top arc of S -->
      <path d="M16,-22 C16,-22 8,-28 -4,-28 C-16,-28 -22,-20 -22,-14 C-22,-8 -18,-4 -8,-2"
            stroke="url(#grad-glow)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <!-- Middle diagonal -->
      <path d="M-8,-2 L8,2"
            stroke="url(#grad-glow)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <!-- Bottom arc of S -->
      <path d="M8,2 C18,4 22,8 22,14 C22,20 16,28 4,28 C-8,28 -16,22 -16,22"
            stroke="url(#grad-glow)" stroke-width="4.5" stroke-linecap="round" fill="none"/>

      <!-- Decorative dots at terminals -->
      <circle cx="16" cy="-22" r="3" fill="#3caefc"/>
      <circle cx="-16" cy="22" r="3" fill="#7d25cd"/>

      <!-- Thin orbit ring (futuristic detail) -->
      <ellipse cx="0" cy="0" rx="28" ry="12"
               stroke="url(#grad-main)" stroke-width="0.8" stroke-dasharray="3,4"
               fill="none" opacity="0.4" transform="rotate(-25)"/>
    </g>

    <!-- Corner shine -->
    <rect x="5" y="15" width="70" height="70" rx="17" fill="url(#grad-shine)" clip-path="url(#icon-clip)"/>
  </g>

  <!-- Wordmark: SAARZ -->
  <g transform="translate(96, 38)">
    <!-- S -->
    <text font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="700" font-size="42" letter-spacing="3" fill="url(#grad-main)">
      SAARZ
    </text>
  </g>

  <!-- Subtitle: Int. -->
  <g transform="translate(96, 68)">
    <text font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="500" font-size="14" letter-spacing="6" fill="#737373">
      INTERNATIONAL
    </text>
  </g>
</svg>
