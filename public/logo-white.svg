<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" fill="none">
  <defs>
    <linearGradient id="gw-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b4dff"/>
      <stop offset="50%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#3caefc"/>
    </linearGradient>
    <linearGradient id="gw-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b57aff"/>
      <stop offset="100%" stop-color="#5bc0ff"/>
    </linearGradient>
    <linearGradient id="gw-shine" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- S Icon Mark -->
  <g>
    <rect x="2" y="12" width="76" height="76" rx="20" fill="url(#gw-main)"/>
    <rect x="5" y="15" width="70" height="70" rx="17" fill="#141825"/>

    <g transform="translate(40, 50)">
      <path d="M16,-22 C16,-22 8,-28 -4,-28 C-16,-28 -22,-20 -22,-14 C-22,-8 -18,-4 -8,-2"
            stroke="url(#gw-glow)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="M-8,-2 L8,2"
            stroke="url(#gw-glow)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="M8,2 C18,4 22,8 22,14 C22,20 16,28 4,28 C-8,28 -16,22 -16,22"
            stroke="url(#gw-glow)" stroke-width="4.5" stroke-linecap="round" fill="none"/>

      <circle cx="16" cy="-22" r="3" fill="#5bc0ff"/>
      <circle cx="-16" cy="22" r="3" fill="#9b4dff"/>

      <ellipse cx="0" cy="0" rx="28" ry="12"
               stroke="url(#gw-main)" stroke-width="0.8" stroke-dasharray="3,4"
               fill="none" opacity="0.3" transform="rotate(-25)"/>
    </g>

    <rect x="5" y="15" width="70" height="70" rx="17" fill="url(#gw-shine)"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(96, 38)">
    <text font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="700" font-size="42" letter-spacing="3" fill="#ffffff">
      SAARZ
    </text>
  </g>

  <g transform="translate(96, 68)">
    <text font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="500" font-size="14" letter-spacing="6" fill="rgba(255,255,255,0.4)">
      INTERNATIONAL
    </text>
  </g>
</svg>
